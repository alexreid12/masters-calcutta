<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Green circle background -->
  <circle cx="16" cy="16" r="16" fill="#006747"/>
  <!-- Flag pole: thin vertical line -->
  <line x1="14" y1="8" x2="14" y2="25" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Gold flag: triangle off the top of the pole -->
  <polygon points="14,8 14,15 21,11.5" fill="#d4af37"/>
  <!-- Ball: small circle at base of pole -->
  <circle cx="14" cy="25" r="2" fill="#d4af37"/>
</svg>
